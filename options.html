<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scribe Options</title>
    <style>
      body {
        max-width: 480px;
        margin: 32px auto;
        padding: 0 16px;
        color: #111827;
        font: 14px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
      }

      select {
        width: 100%;
        box-sizing: border-box;
        padding: 8px;
        border: 1px solid #cbd5e1;
        border-radius: 6px;
        font: inherit;
      }

      #status {
        min-height: 20px;
        margin-top: 12px;
        color: #166534;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 22px;
      }

      .brand img {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        box-shadow: 0 8px 20px rgb(15 23 42 / 12%);
      }

      h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.2;
      }

      .subtitle {
        margin: 3px 0 0;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <header class="brand">
      <img src="assets/scribe-logo.png" alt="" width="42" height="42">
      <div>
        <h1>Scribe</h1>
        <p class="subtitle">Translate selected text in place.</p>
      </div>
    </header>

    <label for="target-language">Default target language</label>
    <select id="target-language">
      <option value="">Browser UI language</option>
      <option value="ar">Arabic</option>
      <option value="bg">Bulgarian</option>
      <option value="bn">Bengali</option>
      <option value="cs">Czech</option>
      <option value="da">Danish</option>
      <option value="de">German</option>
      <option value="el">Greek</option>
      <option value="en">English</option>
      <option value="es">Spanish</option>
      <option value="fi">Finnish</option>
      <option value="fr">French</option>
      <option value="hi">Hindi</option>
      <option value="hr">Croatian</option>
      <option value="hu">Hungarian</option>
      <option value="id">Indonesian</option>
      <option value="it">Italian</option>
      <option value="iw">Hebrew</option>
      <option value="ja">Japanese</option>
      <option value="kn">Kannada</option>
      <option value="ko">Korean</option>
      <option value="lt">Lithuanian</option>
      <option value="mr">Marathi</option>
      <option value="nl">Dutch</option>
      <option value="no">Norwegian</option>
      <option value="pl">Polish</option>
      <option value="pt">Portuguese</option>
      <option value="ro">Romanian</option>
      <option value="ru">Russian</option>
      <option value="sk">Slovak</option>
      <option value="sl">Slovenian</option>
      <option value="sv">Swedish</option>
      <option value="ta">Tamil</option>
      <option value="te">Telugu</option>
      <option value="th">Thai</option>
      <option value="tr">Turkish</option>
      <option value="uk">Ukrainian</option>
      <option value="vi">Vietnamese</option>
      <option value="zh">Chinese</option>
      <option value="zh-Hant">Chinese Traditional</option>
    </select>

    <p id="status" role="status"></p>

    <script src="options.js"></script>
  </body>
</html>
